name: CI & Deploy

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    # actions-gh-pages pushes the built site to the gh-pages branch, which the
    # default read-only GITHUB_TOKEN cannot do.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No `version:` here on purpose — the action reads the `packageManager`
      # field in package.json, and specifying both errors out when they differ.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # pnpm 11 needs Node >= 22.13 (it requires node:sqlite), and `cache: pnpm`
      # shells out to pnpm here — on Node 20 that crashes before install runs.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: dist
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
