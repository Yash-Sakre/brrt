    <script>
      // Apply the saved theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var raw = localStorage.getItem('type-arena:settings');
          var id = 'arena-dark';
          var dark = true;
          if (raw) {
            var parsed = JSON.parse(raw);
            var s = parsed && parsed.state ? parsed.state : parsed;
            if (s && s.themeId) id = s.themeId;
          }
          var lightThemes = ['arena-light', 'paper'];
          dark = lightThemes.indexOf(id) === -1;
          var el = document.documentElement;
          el.setAttribute('data-theme', id);
          el.classList.toggle('dark', dark);
          el.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'arena-dark');
        }
      })();
    </script>
